<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map | MemoMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/map.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <i class="ri-map-pin-2-fill"></i>
            <span>MemoMap</span>
        </div>
        
        <div class="user-profile-mini">
            <div class="user-avatar-mini">
                <span>🌍</span>
            </div>
            <div class="user-info-mini">
                <h4 id="sidebarUserName">Explorer</h4>
                <p>Member since 2024</p>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="ri-dashboard-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="map.html" class="nav-item active">
                <i class="ri-map-pin-line"></i>
                <span>Memory Map</span>
            </a>
            <a href="add-memory.html" class="nav-item">
                <i class="ri-add-line"></i>
                <span>Add Memory</span>
            </a>
            <a href="timeline.html" class="nav-item">
                <i class="ri-timeline-line"></i>
                <span>Timeline</span>
            </a>
            <a href="collections.html" class="nav-item">
                <i class="ri-folder-line"></i>
                <span>Collections</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="ri-user-line"></i>
                <span>Profile</span>
            </a>
            <a href="nostalgia.html" class="nav-item">
                <i class="ri-emotion-line"></i>
                <span>Nostalgia</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="ri-settings-line"></i>
                <span>Settings</span>
            </a>
        </nav>
        
        <button class="logout-btn" id="logoutBtn">
            <i class="ri-logout-box-r-line"></i>
            <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="ri-menu-line"></i>
                </button>
                <div class="welcome-text">
                    <h2>🗺️ Memory Map</h2>
                    <p>Explore your memories around the world</p>
                </div>
            </div>
            <div class="header-right">
                <div class="map-controls">
                    <button class="map-control-btn" id="zoomInBtn" title="Zoom In">
                        <i class="ri-add-line"></i>
                    </button>
                    <button class="map-control-btn" id="zoomOutBtn" title="Zoom Out">
                        <i class="ri-subtract-line"></i>
                    </button>
                    <button class="map-control-btn" id="resetViewBtn" title="Reset View">
                        <i class="ri-refresh-line"></i>
                    </button>
                </div>
                <div class="user-avatar">
                    <span>🌍</span>
                </div>
            </div>
        </header>

        <!-- Map Stats Bar -->
        <div class="map-stats-bar">
            <div class="map-stat">
                <i class="ri-map-pin-fill"></i>
                <span id="pinCount">0</span>
                <span>Memories on Map</span>
            </div>
            <div class="map-stat">
                <i class="ri-global-line"></i>
                <span id="countryCount">0</span>
                <span>Countries</span>
            </div>
            <div class="map-stat">
                <i class="ri-camera-line"></i>
                <span id="photoCount">0</span>
                <span>Photos</span>
            </div>
        </div>

        <!-- Map Container -->
        <div class="map-container">
            <div id="map"></div>
        </div>

        <!-- Memory Info Panel -->
        <div class="memory-panel" id="memoryPanel">
            <div class="panel-header">
                <h3 id="panelTitle">Memory Title</h3>
                <button class="close-panel" id="closePanel">&times;</button>
            </div>
            <div class="panel-content">
                <div class="panel-location">
                    <i class="ri-map-pin-line"></i> <span id="panelLocation"></span>
                </div>
                <div class="panel-date">
                    <i class="ri-calendar-line"></i> <span id="panelDate"></span>
                </div>
                <div class="panel-mood">
                    <i class="ri-emotion-line"></i> <span id="panelMood"></span>
                </div>
                <div class="panel-story" id="panelStory"></div>
                <div class="panel-photos" id="panelPhotos"></div>
                <div class="panel-actions">
                    <button class="view-memory-btn" id="viewMemoryBtn">View Full Memory →</button>
                    <button class="share-memory-btn" id="shareMemoryBtn"><i class="ri-share-line"></i> Share</button>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">📍 All</button>
            <button class="filter-btn" data-filter="happy">😊 Happy</button>
            <button class="filter-btn" data-filter="peaceful">😌 Peaceful</button>
            <button class="filter-btn" data-filter="loved">❤️ Loved</button>
            <button class="filter-btn" data-filter="excited">😎 Excited</button>
            <button class="filter-btn" data-filter="nostalgic">📸 Nostalgic</button>
            <button class="filter-btn" data-filter="sad">😢 Sad</button>
        </div>
    </main>
    <a href="notifications.html" class="notification-icon" style="text-decoration: none;">
    <i class="ri-notification-3-line"></i>
    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
</a>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>
</body>
</html>
