<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MemoMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="bg-animation">
        <div class="floating-icon icon-1">📍</div>
        <div class="floating-icon icon-2">🗺️</div>
        <div class="floating-icon icon-3">📸</div>
        <div class="floating-icon icon-4">🎙️</div>
        <div class="floating-icon icon-5">✨</div>
        <div class="floating-icon icon-6">❤️</div>
        <div class="floating-icon icon-7">🌟</div>
        <div class="floating-icon icon-8">🎒</div>
        <div class="floating-icon icon-9">🏔️</div>
        <div class="floating-icon icon-10">🌊</div>
        
        <div class="pulse-circle circle-1"></div>
        <div class="pulse-circle circle-2"></div>
        <div class="pulse-circle circle-3"></div>
        
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        
        <div class="floating-pin pin-a">
            <i class="ri-map-pin-fill"></i>
        </div>
        <div class="floating-pin pin-b">
            <i class="ri-map-pin-fill"></i>
        </div>
        <div class="floating-pin pin-c">
            <i class="ri-map-pin-fill"></i>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="back-home">
                <a href="index.html">
                    <i class="ri-arrow-left-line"></i> Back to Home
                </a>
            </div>

            <div class="auth-header">
                <div class="logo-icon">
                    <i class="ri-map-pin-2-fill"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your memory journey</p>
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <i class="ri-mail-line"></i>
                    <input type="email" id="email" placeholder="Email address" autocomplete="email">
                </div>

                <div class="input-group">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                    <i class="ri-eye-off-line toggle-password" id="togglePassword"></i>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button class="login-btn" id="loginBtn">
                    <span>Sign In</span>
                    <i class="ri-arrow-right-line"></i>
                </button>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <button class="google-btn" id="googleBtn">
                    <i class="ri-google-fill"></i>
                    <span>Sign in with Google</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
