<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MemoMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/signup.css">
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="bg-animation">
        <div class="floating-icon icon-1">📍</div>
        <div class="floating-icon icon-2">🗺️</div>
        <div class="floating-icon icon-3">📸</div>
        <div class="floating-icon icon-4">🎙️</div>
        <div class="floating-icon icon-5">✨</div>
        <div class="floating-icon icon-6">❤️</div>
        <div class="floating-icon icon-7">🌟</div>
        <div class="floating-icon icon-8">🎒</div>
        <div class="floating-icon icon-9">🏔️</div>
        <div class="floating-icon icon-10">🌊</div>
        <div class="floating-icon icon-11">📖</div>
        <div class="floating-icon icon-12">🎯</div>
        
        <div class="pulse-circle circle-1"></div>
        <div class="pulse-circle circle-2"></div>
        <div class="pulse-circle circle-3"></div>
        
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        
        <div class="floating-pin pin-a">
            <i class="ri-map-pin-fill"></i>
        </div>
        <div class="floating-pin pin-b">
            <i class="ri-map-pin-fill"></i>
        </div>
        <div class="floating-pin pin-c">
            <i class="ri-map-pin-fill"></i>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="back-home">
                <a href="index.html">
                    <i class="ri-arrow-left-line"></i> Back to Home
                </a>
            </div>

            <div class="auth-header">
                <div class="logo-icon">
                    <i class="ri-map-pin-2-fill"></i>
                </div>
                <h1>Create Account</h1>
                <p>Start your memory journey today</p>
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <i class="ri-user-line"></i>
                    <input type="text" id="fullname" placeholder="Full name" autocomplete="name">
                </div>

                <div class="input-group">
                    <i class="ri-mail-line"></i>
                    <input type="email" id="email" placeholder="Email address" autocomplete="email">
                </div>

                <div class="input-group">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="password" placeholder="Password" autocomplete="new-password">
                    <i class="ri-eye-off-line toggle-password" id="togglePassword"></i>
                </div>

                <div class="input-group">
                    <i class="ri-shield-check-line"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm password">
                    <i class="ri-eye-off-line toggle-password" id="toggleConfirmPassword"></i>
                </div>

                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <div class="strength-bar"></div>
                    <span class="strength-text">Enter a password</span>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="termsCheckbox">
                        <span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></span>
                    </label>
                </div>

                <button class="signup-btn" id="signupBtn">
                    <span>Create Account</span>
                    <i class="ri-arrow-right-line"></i>
                </button>

                <div class="divider">
                    <span>or sign up with</span>
                </div>

                <button class="google-btn" id="googleBtn">
                    <i class="ri-google-fill"></i>
                    <span>Sign up with Google</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="./js/signup.js"></script>
</body>
</html>
